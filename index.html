:root {
  --lima: #B4D445;
  --card-glass: rgba(19, 22, 20, 0.7);

* { box-sizing: border-box; margin: 0; padding: 0; }
body {

/* --- VIDEO DE FONDO --- */
.video-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: -1; opacity: 0.4;
}

/* --- ESTILO GLASSMORPHISM --- */
header {
  background: rgba(19, 82, 66, 0.85); backdrop-filter: blur(10px);
  border-bottom: 3px solid var(--lima); padding: 10px 24px; 
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 300;
}

.logo-side { flex: 0 0 100px; display: flex; align-items: center; justify-content: center; }
.logo-side img { height: 90px; width: auto; object-fit: contain; transform: scale(1.3); }

.header-center { text-align: center; flex-grow: 1; padding: 0 15px; }
.h-title { font-size: 16px; font-weight: 800; color: #fff; text-transform: uppercase; }
.h-sub { font-size: 10px; color: var(--lima); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

.panel-iconos, .card, .grafica-header {
  background: var(--card-glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--borde-glass);
  border-radius: 10px;
}

#statusbar {
  background: rgba(9, 11, 10, 0.8); backdrop-filter: blur(5px);
  border-bottom: 1px solid var(--borde-glass);
  padding: 6px 24px; display: flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #5a6b5e;
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: #5a6b5e; flex-shrink: 0; }
.dot.ok { background: var(--lima); animation: blink 2s infinite; }
.dot.err { background: #e85c4a; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.4} }

.layout { display: flex; height: calc(100vh - 80px); overflow: hidden; }
.panel-iconos { width: 300px; padding: 10px; overflow-y: auto; border-right: 1px solid var(--borde-glass); }
.panel-grafica { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

/* Componentes de diseño */
.cat-bloque { margin-bottom: 5px; }
.cat-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; cursor: pointer; border-radius: 8px; }
.cat-header:hover { background: rgba(255,255,255,0.05); }
.cat-nombre { font-size: 11px; font-weight: 700; text-transform: uppercase; flex: 1; }
.cat-arrow { font-size: 10px; color: #5a6b5e; }
.cat-iconos { display: none; flex-direction: column; gap: 2px; padding: 6px; }
.cat-iconos.visible { display: flex; }
.icono-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; }
.icono-item:hover { background: rgba(255,255,255,0.05); }
.icono-item.activo { background: rgba(19, 82, 66, 0.6); border: 1px solid var(--lima); }
.icono-total { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--lima); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.card { padding: 20px 22px; }
.footer-ts { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #5a6b5e; text-align: center; padding: 6px 0 20px; }

@media (max-width: 768px) {
  .layout { flex-direction: column; height: auto; }
  .panel-iconos { width: 100%; max-height: 42vh; }
  .grafica-kpis { display: none; }
  .grid-2 { grid-template-columns: 1fr; }
  header { flex-direction: column; gap: 10px; }
  .logo-side { display: none; }
}
