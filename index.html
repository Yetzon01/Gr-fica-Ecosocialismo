<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Riesgos · SIG Ecosocial</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --lima: #B4D445;
  --deep: rgba(19, 82, 66, 0.85); /* Ahora con transparencia para glassmorphism */
  --negro: #0c0e0d;
  --card: rgba(19, 22, 20, 0.7); /* Fondo traslúcido */
  --borde: rgba(180, 212, 69, 0.3);
  --texto: #dde8df;
  --muted: #5a6b5e;
  --rojo: #e85c4a;
  --naranja: #e8934a;
  --azul: #4ab3e8;
  --violeta: #9b7fe8;
}

/* --- VIDEO DE FONDO --- */
.video-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: -1;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--negro); color: var(--texto); font-family: 'Space Grotesk', sans-serif; 
  min-height: 100vh; overflow-x: hidden;
}

header {
  background: var(--deep); backdrop-filter: blur(10px); border-bottom: 3px solid var(--lima);
  padding: 10px 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 300;
}

/* ZOOM Y AJUSTE DE LOGOS */
.logo-side { flex: 0 0 100px; display: flex; align-items: center; justify-content: center; }
.logo-side img { height: 90px; width: auto; object-fit: contain; transform: scale(1.3); }

.header-center { text-align: center; flex-grow: 1; padding: 0 15px; }
.h-title { font-size: 16px; font-weight: 800; color: #fff; text-transform: uppercase; }
.h-sub { font-size: 10px; color: var(--lima); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

#statusbar {
  background: rgba(9, 11, 10, 0.8); backdrop-filter: blur(5px); border-bottom: 1px solid var(--borde);
  padding: 6px 24px; display: flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted);
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.ok { background: var(--lima); animation: blink 2s infinite; }
.dot.err { background: var(--rojo); }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.4} }

.layout { display: flex; height: calc(100vh - 80px); overflow: hidden; }

.panel-iconos {
  width: 300px; flex-shrink: 0; background: rgba(15, 18, 16, 0.7); backdrop-filter: blur(10px);
  border-right: 1px solid var(--borde); overflow-y: auto; padding: 10px;
}

.cat-bloque { margin-bottom: 5px; }
.cat-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; cursor: pointer;
  background: var(--card); border: 1px solid var(--borde); transition: border-color .2s; user-select: none; margin-bottom: 2px;
}
.cat-header:hover { border-color: var(--lima); }
.cat-header.abierto { border-color: var(--lima); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
.cat-emoji { font-size: 16px; }
.cat-nombre { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; flex: 1; }
.cat-count { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; }
.cat-arrow { font-size: 10px; color: var(--muted); transition: transform .2s; }
.cat-header.abierto .cat-arrow { transform: rotate(90deg); }

.cat-iconos { display: none; flex-direction: column; gap: 2px; background: rgba(10, 12, 11, 0.8); border: 1px solid var(--lima); border-top: none; border-radius: 0 0 8px 8px; padding: 6px; }
.cat-iconos.visible { display: flex; }

.icono-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: all .15s; background: transparent; }
.icono-item:hover { background: rgba(255,255,255,0.05); border-color: var(--borde); }
.icono-item.activo { background: rgba(19, 82, 66, 0.6); border-color: var(--lima); }
.icono-emoji { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
.icono-label { font-size: 11px; color: var(--texto); flex: 1; line-height: 1.3; }
.icono-total { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; color: var(--lima); background: rgba(180,212,69,.1); padding: 2px 6px; border-radius: 10px; flex-shrink: 0; }
.icono-total.cero { color: var(--muted); background: transparent; }

.panel-grafica { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

.estado-vacio { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--muted); text-align: center; padding: 40px; background: var(--card); backdrop-filter: blur(10px); border-radius: 10px; }
.estado-vacio .big-emoji { font-size: 60px; opacity: .25; }
.estado-vacio h3 { font-size: 16px; color: var(--texto); font-weight: 700; }
.estado-vacio p { font-size: 12px; line-height: 1.7; max-width: 300px; }

.grafica-header { background: var(--card); backdrop-filter: blur(10px); border: 1px solid var(--borde); border-radius: 10px; padding: 18px 22px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.grafica-emoji-big { font-size: 38px; }
.grafica-titulo { font-size: 18px; font-weight: 800; color: #fff; }
.grafica-subtitulo { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
.grafica-kpis { display: flex; gap: 20px; margin-left: auto; }
.kpi-mini { text-align: center; }
.kpi-mini-n { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
.kpi-mini-l { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; }

.card { background: var(--card); backdrop-filter: blur(10px); border: 1px solid var(--borde); border-radius: 10px; padding: 20px 22px; }
.card-hd { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
.card-title { font-size: 12px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: .4px; }
.card-sub { font-size: 9px; color: var(--muted); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }
.badge { background: rgba(19, 82, 66, 0.8); border: 1px solid var(--lima); color: var(--lima); font-size: 8px; font-weight: 700; padding: 2px 7px; border-radius: 20px; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
.chart-box { position: relative; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
thead th { background: rgba(9, 11, 10, 0.5); color: var(--lima); font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--borde); }
tbody td { padding: 9px 10px; border-bottom: 1px solid var(--borde); vertical-align: middle; }
tbody tr:hover td { background: rgba(180,212,69,.04); }
.rank { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 10px; }
.bar-mini { height: 4px; background: var(--borde); border-radius: 2px; margin-top: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
.num-bold { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; }

.loader-full { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 12px; color: var(--muted); font-size: 11px; font-family: 'JetBrains Mono', monospace; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--borde); border-top-color: var(--lima); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.footer-ts { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); text-align: center; padding: 6px 0 20px; }

@media (max-width: 768px) {
  .layout { flex-direction: column; height: auto; }
  .panel-iconos { width: 100%; max-height: 42vh; }
  .grafica-kpis { display: none; }
  .grid-2 { grid-template-columns: 1fr; }
  header { flex-direction: column; gap: 10px; }
  .logo-side { display: none; }
}
</style>
</head>
<body>

<video autoplay muted loop playsinline class="video-bg">
  <source src="video1.mp4.mp4" type="video/mp4">
</video>

<header>
  <div class="logo-side"><img src="logo1.png.png" alt="Logo 1"></div>
  <div class="header-center">
    <div class="h-title">GRÁFICAS DE MAPAS DE RIESGOS COMUNITARIOS</div>
    <div class="h-sub">MUNICIPIO SIMÓN BOLÍVAR · ESTADO ANZOÁTEGUI</div>
  </div>
  <div class="logo-side" style="justify-content: flex-end;"><img src="logo2.png.png" alt="Logo 2"></div>
</header>

<div id="statusbar">
  <div class="dot" id="sdot"></div>
  <span id="stxt">Conectando con Supabase...</span>
</div>

<div class="layout">
  <div class="panel-iconos" id="panel-iconos">
    <div class="loader-full" id="loader-iconos">
      <div class="spinner"></div>
      <span>Cargando indicadores...</span>
    </div>
  </div>
  <div class="panel-grafica" id="panel-grafica">
    <div class="estado-vacio" id="estado-vacio">
      <div class="big-emoji">👈</div>
      <h3>Selecciona un indicador</h3>
      <p>Haz clic en cualquier ícono del panel izquierdo para ver la comparación de ese indicador entre todas las comunas.</p>
    </div>
  </div>
</div>

</body>
</html>
