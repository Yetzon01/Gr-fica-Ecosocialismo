<html lang="es">

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --lima: #B4D445;
  --deep: #135242;
  --negro: #0c0e0d;
  --card: #131614;
  --borde: #1e2320;
  --texto: #dde8df;
  --muted: #5a6b5e;
  --rojo: #e85c4a;
  --naranja: #e8934a;
  --azul: #4ab3e8;
  --violeta: #9b7fe8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--negro); color: var(--texto); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }

header {
  background: var(--deep); border-bottom: 3px solid var(--lima);
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 300;
}
.h-title { font-size: 16px; font-weight: 800; color: #fff; text-transform: uppercase; }
.h-sub { font-size: 10px; color: var(--lima); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.btn-back {
  background: transparent; border: 1px solid var(--lima); color: var(--lima);
  padding: 7px 14px; border-radius: 6px; font-size: 11px; font-weight: 700;
  cursor: pointer; text-decoration: none; letter-spacing: 1px; text-transform: uppercase; transition: .2s;
}
.btn-back:hover { background: var(--lima); color: var(--deep); }

#statusbar {
  background: #090b0a; border-bottom: 1px solid var(--borde);
  padding: 6px 24px; display: flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted);
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.ok { background: var(--lima); animation: blink 2s infinite; }
.dot.err { background: var(--rojo); }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.4} }

.layout { display: flex; height: calc(100vh - 80px); overflow: hidden; }

.panel-iconos {
  width: 300px; flex-shrink: 0;
  background: #0f1210; border-right: 1px solid var(--borde);
  overflow-y: auto; padding: 10px;
}

.cat-bloque { margin-bottom: 5px; }
.cat-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  background: var(--card); border: 1px solid var(--borde);
  transition: border-color .2s; user-select: none; margin-bottom: 2px;
}
.cat-header:hover { border-color: var(--lima); }
.cat-header.abierto { border-color: var(--lima); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
.cat-emoji { font-size: 16px; }
.cat-nombre { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; flex: 1; }
.cat-count { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; }
.cat-arrow { font-size: 10px; color: var(--muted); transition: transform .2s; }
.cat-header.abierto .cat-arrow { transform: rotate(90deg); }

.cat-iconos {
  display: none; flex-direction: column; gap: 2px;
  background: #0a0c0b; border: 1px solid var(--lima);
  border-top: none; border-radius: 0 0 8px 8px; padding: 6px;
}
.cat-iconos.visible { display: flex; }

.icono-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 6px; cursor: pointer;
  border: 1px solid transparent; transition: all .15s; background: transparent;
}
.icono-item:hover { background: var(--card); border-color: var(--borde); }
.icono-item.activo { background: var(--deep); border-color: var(--lima); }
.icono-emoji { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
.icono-label { font-size: 11px; color: var(--texto); flex: 1; line-height: 1.3; }
.icono-total {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
  color: var(--lima); background: rgba(180,212,69,.1); padding: 2px 6px; border-radius: 10px; flex-shrink: 0;
}
.icono-total.cero { color: var(--muted); background: transparent; }

.panel-grafica { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

.estado-vacio {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  color: var(--muted); text-align: center; padding: 40px;
}
.estado-vacio .big-emoji { font-size: 60px; opacity: .25; }
.estado-vacio h3 { font-size: 16px; color: var(--texto); font-weight: 700; }
.estado-vacio p { font-size: 12px; line-height: 1.7; max-width: 300px; }

.grafica-header {
  background: var(--card); border: 1px solid var(--borde); border-radius: 10px;
  padding: 18px 22px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.grafica-emoji-big { font-size: 38px; }
.grafica-titulo { font-size: 18px; font-weight: 800; color: #fff; }
.grafica-subtitulo { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
.grafica-kpis { display: flex; gap: 20px; margin-left: auto; }
.kpi-mini { text-align: center; }
.kpi-mini-n { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
.kpi-mini-l { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; }

.card { background: var(--card); border: 1px solid var(--borde); border-radius: 10px; padding: 20px 22px; }
.card-hd { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
.card-title { font-size: 12px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: .4px; }
.card-sub { font-size: 9px; color: var(--muted); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }
.badge {
  background: var(--deep); border: 1px solid var(--lima); color: var(--lima);
  font-size: 8px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;
}
.chart-box { position: relative; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
thead th {
  background: #090b0a; color: var(--lima); font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--borde);
}
tbody td { padding: 9px 10px; border-bottom: 1px solid var(--borde); vertical-align: middle; }
tbody tr:hover td { background: rgba(180,212,69,.04); }
.rank { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 10px; }
.bar-mini { height: 4px; background: var(--borde); border-radius: 2px; margin-top: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
.num-bold { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; }

.loader-full {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 200px; gap: 12px; color: var(--muted); font-size: 11px; font-family: 'JetBrains Mono', monospace;
}
.spinner { width: 28px; height: 28px; border: 2px solid var(--borde); border-top-color: var(--lima); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.footer-ts { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); text-align: center; padding: 6px 0 20px; }

@media (max-width: 768px) {
  .layout { flex-direction: column; height: auto; }
  .panel-iconos { width: 100%; max-height: 42vh; }
  .grafica-kpis { display: none; }
  .grid-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="statusbar">

</div>

<div class="layout">

      <div class="spinner"></div>

      <p>Haz clic en cualquier ícono del panel izquierdo para ver la comparación de ese indicador entre todas las comunas.</p>
    </div>

<script>
const _sb = supabase.createClient(
  'https://zezcmftcbbzplhtdqotd.supabase.co',
  'sb_publishable_bNaRcykfZaVdW67HsEf3Tw_rWemQCui'

const CATEGORIAS = [
  {

    iconos: [

      { id: 'riesgo_carro',        emoji: '🚗', label: 'Cauchera' },

      { id: 'vuln_nino',  emoji: '👶', label: 'Niños y Niñas' },
      { id: 'vuln_adult', emoji: '👴', label: 'Adulto Mayor' },
      { id: 'vuln_cron',  emoji: '🩺', label: 'Enfermo Crónico' },
    ]
  },

    iconos: [

      { id: 'cpt1',       emoji: '🏥', label: 'CPT Tipo I' },
      { id: 'cpt2',       emoji: '🏥', label: 'CPT Tipo II' },
      { id: 'cpt3',       emoji: '🏥', label: 'CPT Tipo III' },

      { id: 'enfermero',  emoji: '👨‍⚕️', label: 'Personal de Enfermería' },

      { id: 'cuadrante',  emoji: '🛡️', label: 'Cuadrante de Paz' },

      { id: 'pc_inst',    emoji: '🚨', label: 'Protección Civil' },
      { id: 'pol_amb',    emoji: '🌿', label: 'Policía Ambiental' },

    ]
  },
  {
    id: 'refugio', nombre: 'Centros de Refugio', emoji: '⛺', color: '#9b7fe8',
    iconos: [
      { id: 'refugio_idlesia',  emoji: '⛪', label: 'Iglesia / Centro Religioso' },
      { id: 'refugio_escuela',  emoji: '🏫', label: 'Escuela / Unidad Educativa' },
      { id: 'refugio_comedor',  emoji: '🍽️', label: 'Comedor / Casa Alimentaria' },
      { id: 'refugio_misiones', emoji: '🎪', label: 'Base de Misiones' },
    ]
  },
  {
    id: 'forestal', nombre: 'Gestión Forestal', emoji: '🌳', color: '#B4D445',
    iconos: [
      { id: 'verde',     emoji: '🌳', label: 'Área Verde / Plaza' },
      { id: 'huerto',    emoji: '👨‍🌾', label: 'Espacio Productivo' },
      { id: 'araguaney', emoji: '🟡', label: 'Araguaney' },
      { id: 'apamate',   emoji: '🌸', label: 'Apamate' },
      { id: 'cereipo',   emoji: '🌿', label: 'Cereipo' },
      { id: 'manglar',   emoji: '🌴', label: 'Manglar' },
    ]
  },
  {
    id: 'animal', nombre: 'Control Animal', emoji: '🐾', color: '#4ae8b0',
    iconos: [
      { id: 'pollos',   emoji: '🐣', label: 'Cría de Pollos' },
      { id: 'cerdo_c',  emoji: '🐷', label: 'Cerdo (Cama Profunda)' },
      { id: 'cerdo_s',  emoji: '🐗', label: 'Cerdo (Sin Cama)' },
      { id: 'ovejos',   emoji: '🐑', label: 'Cría de Ovejos' },
      { id: 'cautivo',  emoji: '🦁', label: 'Animal en Cautiverio' },
      { id: 'invasora', emoji: '🦎', label: 'Especie Invasora' },
    ]
  },
  {
    id: 'reciclaje', nombre: 'Gestión de Reciclaje', emoji: '♻️', color: '#74e84a',
    iconos: [
      { id: 'recicladores', emoji: '♻️', label: 'Puntos de Recicladores' },
    ]
  }
];

let DATOS = {};
let chartBarras = null;
let chartDona   = null;

function setStatus(msg, estado = 'ok') {
  document.getElementById('stxt').textContent = msg;
  document.getElementById('sdot').className = 'dot ' + estado;
}

function colorAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function cortar(str, n = 30) { return str.length > n ? str.slice(0,n)+'…' : str; }

function parsearGeoJSON(geo) {
  const c = {};
  if (!geo?.features) return c;
  geo.features.forEach(f => {
    const tid = f.properties?.tipoId;
    if (tid) c[tid] = (c[tid]||0) + 1;
  });
  return c;
}

async function cargar() {
  setStatus('Consultando mapas_comunales...', 'ok');
  try {
    const { data, error } = await _sb
      .from('mapas_comunales')
      .select('id_comuna, geometria_mapa');

    if (error) throw error;
    if (!data?.length) { setStatus('Sin datos en mapas_comunales', 'err'); return; }

    setStatus(`Procesando ${data.length} registros...`, 'ok');

    data.forEach(row => {
      const com = row.id_comuna;
      if (!com) return;
      if (!DATOS[com]) DATOS[com] = {};
      const parcial = parsearGeoJSON(row.geometria_mapa);
      Object.entries(parcial).forEach(([tid, cnt]) => {
        DATOS[com][tid] = (DATOS[com][tid]||0) + cnt;
      });
    });

    const totalesPorTipo = {};
    Object.values(DATOS).forEach(com => {
      Object.entries(com).forEach(([tid, cnt]) => {
        totalesPorTipo[tid] = (totalesPorTipo[tid]||0) + cnt;
      });
    });

    setStatus(`✓ ${data.length} sectores · ${Object.keys(DATOS).length} comunas`, 'ok');
    construirPanel(totalesPorTipo);

  } catch(err) {
    setStatus('Error: ' + err.message, 'err');
    console.error(err);
  }
}

function construirPanel(totalesPorTipo) {
  const panel = document.getElementById('panel-iconos');
  panel.innerHTML = '';

  CATEGORIAS.forEach((cat, ci) => {
    const totalCat = cat.iconos.reduce((s,ic) => s+(totalesPorTipo[ic.id]||0), 0);

    const bloque = document.createElement('div');
    bloque.className = 'cat-bloque';

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <span class="cat-emoji">${cat.emoji}</span>
      <span class="cat-nombre" style="color:${cat.color}">${cat.nombre}</span>
      <span class="cat-count" style="color:${cat.color}">${totalCat}</span>
      <span class="cat-arrow">▶</span>`;

    const contIconos = document.createElement('div');
    contIconos.className = 'cat-iconos';

    cat.iconos.forEach(icono => {
      const total = totalesPorTipo[icono.id] || 0;
      const item = document.createElement('div');
      item.className = 'icono-item';
      item.dataset.tid = icono.id;
      item.innerHTML = `
        <span class="icono-emoji">${icono.emoji}</span>
        <span class="icono-label">${icono.label}</span>
        <span class="icono-total ${total===0?'cero':''}">${total}</span>`;
      item.addEventListener('click', () => mostrarGrafica(icono, cat, item));
      contIconos.appendChild(item);
    });

    header.addEventListener('click', () => {
      const estaAbierto = header.classList.contains('abierto');
      document.querySelectorAll('.cat-header').forEach(h => h.classList.remove('abierto'));
      document.querySelectorAll('.cat-iconos').forEach(c => c.classList.remove('visible'));
      if (!estaAbierto) {
        header.classList.add('abierto');
        contIconos.classList.add('visible');
      }
    });

    bloque.appendChild(header);
    bloque.appendChild(contIconos);
    panel.appendChild(bloque);

    // Abrir primera categoría
    if (ci === 0) {
      header.classList.add('abierto');
      contIconos.classList.add('visible');
    }
  });
}

function mostrarGrafica(icono, cat, itemEl) {
  // Marcar activo
  document.querySelectorAll('.icono-item').forEach(el => el.classList.remove('activo'));
  itemEl.classList.add('activo');

  // Destruir gráficas previas
  if (chartBarras) { chartBarras.destroy(); chartBarras = null; }
  if (chartDona)   { chartDona.destroy();   chartDona   = null; }

  // Contar por comuna
  const porComuna = {};
  Object.entries(DATOS).forEach(([com, ind]) => {
    if (ind[icono.id]) porComuna[com] = ind[icono.id];
  });

  const sorted  = Object.entries(porComuna).sort((a,b) => b[1]-a[1]);
  const total   = sorted.reduce((s,[,v]) => s+v, 0);
  const maxVal  = sorted[0]?.[1] || 0;
  const nCom    = sorted.length;

  const panel = document.getElementById('panel-grafica');
  panel.innerHTML = '';

  // Sin datos
  if (sorted.length === 0) {
    panel.innerHTML = `
      <div class="estado-vacio">
        <div class="big-emoji">${icono.emoji}</div>
        <h3>${icono.label}</h3>
        <p>No hay registros de este indicador en ninguna comuna todavía.</p>
      </div>`;
    return;
  }

  // ── HEADER KPIs ──────────────────────────────────────────────
  const hdr = document.createElement('div');
  hdr.className = 'grafica-header';
  hdr.innerHTML = `
    <div class="grafica-emoji-big">${icono.emoji}</div>
    <div>
      <div class="grafica-titulo">${icono.label}</div>
      <div class="grafica-subtitulo">${cat.nombre} · id: ${icono.id}</div>
    </div>
    <div class="grafica-kpis">
      <div class="kpi-mini">
        <div class="kpi-mini-n" style="color:${cat.color}">${total}</div>
        <div class="kpi-mini-l">Total registros</div>
      </div>
      <div class="kpi-mini">
        <div class="kpi-mini-n" style="color:${cat.color}">${nCom}</div>
        <div class="kpi-mini-l">Comunas</div>
      </div>
      <div class="kpi-mini">
        <div class="kpi-mini-n" style="color:${cat.color}">${maxVal}</div>
        <div class="kpi-mini-l">Máximo</div>
      </div>
    </div>`;
  panel.appendChild(hdr);

  // ── BARRAS HORIZONTALES ────────────────────────────────────
  const alturaMin = Math.max(260, sorted.length * 38);
  const cardB = document.createElement('div');
  cardB.className = 'card';
  cardB.innerHTML = `
    <div class="card-hd">
      <div>
        <div class="card-title">Comparación entre Comunas</div>
        <div class="card-sub">todas las comunas con registros de "${icono.label}" · mayor a menor</div>
      </div>
      <span class="badge">RANKING</span>
    </div>
    <div class="chart-box" style="min-height:${alturaMin}px;">
      <canvas id="cv-barras"></canvas>
    </div>`;
  panel.appendChild(cardB);

  // ── GRID: DONA + TABLA ─────────────────────────────────────
  const grid = document.createElement('div');
  grid.className = 'grid-2';

  const cardDonEl = document.createElement('div');
  cardDonEl.className = 'card';
  cardDonEl.innerHTML = `
    <div class="card-hd">
      <div>
        <div class="card-title">Distribución Top 6</div>
        <div class="card-sub">proporción de las comunas con mayor cantidad</div>
      </div>
      <span class="badge">DONA</span>
    </div>
    <div class="chart-box" style="min-height:260px;">
      <canvas id="cv-dona"></canvas>
    </div>`;
  grid.appendChild(cardDonEl);

  const cardTbl = document.createElement('div');
  cardTbl.className = 'card';
  cardTbl.innerHTML = `
    <div class="card-hd">
      <div>
        <div class="card-title">Tabla de Ranking</div>
        <div class="card-sub">posición de cada comuna para este indicador</div>
      </div>
      <span class="badge">TABLA</span>
    </div>
    <div class="tbl-wrap" style="max-height:300px; overflow-y:auto;">
      <table>
        <thead><tr><th>#</th><th>COMUNA</th><th>CANT.</th></tr></thead>
        <tbody id="tbody-rk"></tbody>
      </table>
    </div>`;
  grid.appendChild(cardTbl);
  panel.appendChild(grid);

  panel.appendChild(Object.assign(document.createElement('div'), {
    className: 'footer-ts',
    textContent: `Supabase · mapas_comunales → geometria_mapa → tipoId: "${icono.id}"`
  }));

  // ── RENDER BARRAS ──────────────────────────────────────────
  chartBarras = new Chart(document.getElementById('cv-barras'), {
    type: 'bar',
    data: {
      labels: sorted.map(([c]) => cortar(c, 32)),
      datasets: [{
        data: sorted.map(([,v]) => v),
        backgroundColor: sorted.map(([,v]) => colorAlpha(cat.color, 0.25 + (v/maxVal)*0.7)),
        borderColor:     sorted.map(([,v]) => v===maxVal ? cat.color : 'transparent'),
        borderWidth:     sorted.map(([,v]) => v===maxVal ? 2 : 0),
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          title: ctx => sorted[ctx[0].dataIndex][0],
          label: ctx => ` ${ctx.parsed.x} × "${icono.label}"`
        }}
      },
      scales: {
        x: { grid:{color:'#1a1c1b'}, ticks:{color:'#5a6b5e'}, border:{color:'#1e2320'} },
        y: { grid:{display:false}, ticks:{color:'#c0cac2',font:{size:10}}, border:{color:'#1e2320'} }
      }
    }
  });

  // ── RENDER DONA ────────────────────────────────────────────
  const top6    = sorted.slice(0, 6);
  const resto   = sorted.slice(6).reduce((s,[,v]) => s+v, 0);
  const dLabels = top6.map(([c]) => cortar(c, 22));
  const dData   = top6.map(([,v]) => v);
  if (resto > 0) { dLabels.push('Otras'); dData.push(resto); }

  const pal = [cat.color,'#4ab3e8','#e8934a','#9b7fe8','#e85c4a','#74e84a','#5a6b5e'];

  chartDona = new Chart(document.getElementById('cv-dona'), {
    type: 'doughnut',
    data: {
      labels: dLabels,
      datasets: [{
        data: dData,
        backgroundColor: pal.map((c,i) => colorAlpha(c, i<6 ? 0.85 : 0.4)),
        borderColor: '#131614', borderWidth: 3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: {
        legend: { position:'bottom', labels:{color:'#c0cac2',padding:10,font:{size:9},boxWidth:10} },
        tooltip: { callbacks: { label: ctx => ` ${ctx.parsed} (${Math.round(ctx.parsed/total*100)}%)` } }
      }
    },
    plugins: [{
      id: 'centro',
      beforeDraw(chart) {
        const {ctx,width,height} = chart;
        ctx.save();
        ctx.fillStyle = cat.color;
        ctx.font = `800 22px "JetBrains Mono",monospace`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(total, width/2, height/2 - 9);
        ctx.fillStyle = '#5a6b5e';
        ctx.font = `9px "JetBrains Mono",monospace`;
        ctx.fillText('TOTAL', width/2, height/2 + 12);
        ctx.restore();
      }
    }]
  });

  // ── TABLA ──────────────────────────────────────────────────
  const tbody = document.getElementById('tbody-rk');
  sorted.forEach(([com, cnt], i) => {
    const pct = Math.round(cnt/maxVal*100);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="rank">${String(i+1).padStart(2,'0')}</td>
      <td style="font-size:10px;color:${i===0?'#fff':'#c0cac2'};font-weight:${i===0?700:400}">
        ${i===0?'🥇 ':''}${com}
        <div class="bar-mini"><div class="bar-fill" style="width:${pct}%;background:${cat.color}"></div></div>
      </td>
      <td class="num-bold" style="color:${cat.color}">${cnt}</td>`;
    tbody.appendChild(tr);
  });
}

Chart.defaults.color = '#5a6b5e';
Chart.defaults.font.family = "'Space Grotesk', sans-serif";
Chart.defaults.font.size = 10;
cargar();
</script>
</body>
</html>
